name: Fetch xgate data

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch xgate agents
        run: node scripts/fetch-xgate.js

      - name: Check service health
        run: node scripts/check-health.js

      - name: Build network graph
        run: node scripts/fetch-graph.js

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/xgate.json public/data/health.json public/data/stats.json public/data/graph.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update xgate data, health, and graph"
            git push
          fi
